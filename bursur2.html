<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1486635931470536" crossorigin="anonymous"></script>
    <title>Choose Display Format</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, system-ui, sans-serif; }
        body { background: #f8fafc; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 2rem 1rem; }
        .container { max-width: 1300px; width: 100%; }
        .view-choice-section { text-align: center; padding: 2.5rem 1rem; background: white; border-radius: 24px; border: 1px solid #e2e8f0; max-width: 780px; margin: 0 auto; }
        .view-choice-section h3 { font-size: 1.8rem; font-weight: 600; color: #0f172a; margin-bottom: 2rem; }
        .choice-grid { display: flex; justify-content: center; gap: 1.5rem; flex-wrap: wrap; }
        .choice-btn { background: white; border: 2px solid #2563eb; border-radius: 40px; padding: 0.9rem 2.5rem; font-weight: 600; font-size: 1.15rem; color: #2563eb; cursor: pointer; transition: all 0.15s; min-width: 180px; text-decoration: none; display: inline-block; }
        .choice-btn:hover { background: #2563eb; color: white; box-shadow: 0 8px 14px -6px rgba(37, 99, 235, 0.25); }
        .back-btn { background: transparent; border: 2px solid #2563eb; padding: 0.6rem 1.4rem; border-radius: 40px; font-weight: 600; color: #2563eb; cursor: pointer; transition: 0.15s; margin-top: 2.5rem; font-size: 0.95rem; text-decoration: none; display: inline-block; }
        .back-btn:hover { background: #2563eb; color: white; }
        .ads-container { margin: 2rem 0; text-align: center; min-height: 90px; background: #f1f5f9; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #94a3b8; font-size: 0.9rem; border: 1px dashed #cbd5e1; }
    </style>
</head>
<body>
    <div class="container">
        <div class="view-choice-section">
            <h3 id="choiceHeading">📌 Choose display format</h3>
            
            <div class="choice-grid">
                <a id="calLink" href="#" class="choice-btn">📅 Calendar</a>
                <a id="gridLink" href="#" class="choice-btn">🗂️ Grid (Original)</a>
            </div>
            
            <br>
            <a href="bursur1.html" class="back-btn">← Back to Faculties</a>
        </div>

        <div class="ads-container">
            <amp-ad width="100vw" height="90" type="adsense" data-ad-client="ca-pub-1486635931470536" data-ad-slot="2222222222" data-auto-format="rspv" data-full-width><div overflow></div></amp-ad>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const faculty = params.get('faculty');
        
        const FACULTY_LABEL = {
            'accounting':'Accounting','education':'Education','engineering':'Engineering',
            'it-computer-science':'IT & Computer Science','law':'Law','sciences':'Sciences'
        };

        if (!faculty || !FACULTY_LABEL[faculty]) {
            window.location.href = 'bursur1.html';
        } else {
            document.getElementById('choiceHeading').textContent = `📌 Choose Format for ${FACULTY_LABEL[faculty]}`;
            document.getElementById('calLink').href = `bursur3.html?faculty=${faculty}&style=calendar`;
            document.getElementById('gridLink').href = `bursur3.html?faculty=${faculty}&style=grid`;
        }
    </script>
</body>
</html>
