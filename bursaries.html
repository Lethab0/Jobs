        .top-nav .badge {

            font-size: 0.85rem;
            color: #1e3a6b;

            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            border: 1px solid rgba(37, 99, 235, 0.12);

        .nav-btn {

            border: none;
            padding: 0.45rem 1.4rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;

            text-decoration: none;
            display: inline-flex;
            align-items: center;

        .nav-btn:hover {
            background: #2563eb;

            box-shadow: 0 6px 16px -6px rgba(37, 99, 235, 0.35);
            transform: translateY(-1px);
        }

        .nav-btn:active {
            transform: scale(0.97);
        }

        /* ── Utility ── */
        .hidden {
            display: none !important;
        }

        /* ── View 1: Faculty Grid ── */
        .faculty-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(195px, 1fr));
            gap: 1.4rem;
            margin-top: 0.5rem;
        }

        .faculty-card,
        .home-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 1.5px solid rgba(255, 255, 255, 0.5);
            border-radius: 20px;
            padding: 2rem 0.8rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.22, 1, 0.36, 1);
            box-shadow: 0 4px 12px -6px rgba(0, 20, 40, 0.04);
            text-decoration: none;
            display: block;
            position: relative;
            overflow: hidden;
        }

        .faculty-card::after,
        .home-card::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 20px;
            padding: 1.5px;
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.15), rgba(59, 130, 246, 0.05));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .faculty-card:hover,
        .home-card:hover {
            transform: translateY(-6px) scale(1.01);
            box-shadow: 0 20px 40px -14px rgba(37, 99, 235, 0.20), 0 4px 12px -4px rgba(0, 0, 0, 0.02);
            background: #ffffff;
            border-color: rgba(37, 99, 235, 0.20);
        }

        .faculty-card:active,
        .home-card:active {
            transform: scale(0.97) translateY(-2px);
        }

        .faculty-name,
        .home-label {
            font-weight: 700;
            font-size: 1.15rem;
            color: #1a2f4e;
            transition: color 0.2s;
            letter-spacing: -0.01em;
        }

        .faculty-card:hover .faculty-name {
            color: #2563eb;
        }

        .home-card {
            background: linear-gradient(135deg, #f0f7ff, #e6eefa);
            border-color: rgba(37, 99, 235, 0.15);
        }

        .home-card:hover .home-label {
            color: #2563eb;
        }

        .faculty-card .icon-emoji,

            font-size: 1.8rem;
            display: block;
            margin-bottom: 0.4rem;
        }

        /* ── View 2: Format Selection ── */
        .view-choice-section {
            text-align: center;
            padding: 3rem 2rem;
            background: rgba(255, 255, 255, 0.80);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 12px 40px -12px rgba(0, 20, 40, 0.06);
            max-width: 780px;
            margin: 0 auto;
        }

        .view-choice-section h3 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #0b1a2e;
            margin-bottom: 2rem;
            letter-spacing: -0.02em;
        }

        .view-choice-section h3 .highlight {
            color: #2563eb;
        }

        .choice-grid {
            display: flex;
            justify-content: center;
            gap: 1.25rem;
            flex-wrap: wrap;
        }

        .choice-btn {
            background: white;
            border: 1.5px solid #dce4ef;
            border-radius: 60px;
            padding: 0.85rem 2.6rem;
            font-weight: 600;
            font-size: 1.05rem;
            color: #1a2f4e;
            cursor: pointer;
            transition: all 0.2s ease;
            min-width: 170px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.01);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .choice-btn:hover {
            background: #2563eb;
            color: white;
            border-color: #2563eb;
            box-shadow: 0 12px 28px -10px rgba(37, 99, 235, 0.30);
            transform: translateY(-2px);
        }

        .choice-btn:active {
            transform: scale(0.96);
        }

        .choice-btn .emoji {
            font-size: 1.2rem;
        }

        /* ── View 3A: Calendar ── */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.6rem;
        }

        .month-box {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            padding: 1.4rem 1.3rem 1.1rem;
            box-shadow: 0 6px 18px -8px rgba(0, 20, 40, 0.04);
            transition: all 0.2s ease;
        }

        .month-box:hover {
            box-shadow: 0 12px 32px -12px rgba(0, 20, 50, 0.08);
            transform: translateY(-2px);
        }

        .month-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #0b1a2e;
            border-bottom: 2px solid rgba(37, 99, 235, 0.12);
            padding-bottom: 0.65rem;
            margin-bottom: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .month-title .month-count {
            font-size: 0.75rem;
            font-weight: 500;
            color: #6b7f99;
            background: #eef2f7;
            padding: 0.1rem 0.7rem;
            border-radius: 40px;
        }

        .event-item {
            background: rgba(241, 245, 250, 0.7);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
            border-radius: 12px;
            padding: 0.6rem 0.9rem;
            margin-bottom: 0.45rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.75rem;
            border: 1px solid rgba(255, 255, 255, 0.4);
            transition: all 0.15s ease;
        }

        .event-item:hover {
            background: #ffffff;
            border-color: rgba(37, 99, 235, 0.10);
            box-shadow: 0 2px 8px -4px rgba(0, 0, 0, 0.02);
        }

        .event-name {
            font-weight: 600;
            font-size: 0.92rem;
            color: #1a2f4e;
            flex: 1;
            line-height: 1.3;
        }

        .event-day {
            background: white;
            border: 1px solid #dce4ef;
            padding: 0.1rem 0.7rem;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 700;
            color: #2563eb;
            white-space: nowrap;
            letter-spacing: 0.02em;
        }

        /* ── View 3B: Grid (original style) ── */
        .original-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
            gap: 1.6rem;
        }

        .bursary-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: 24px;
            padding: 1.6rem 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 6px 18px -8px rgba(0, 20, 40, 0.04);
            transition: all 0.25s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .bursary-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 18px 36px -14px rgba(0, 20, 50, 0.08);
            background: #ffffff;
            border-color: rgba(37, 99, 235, 0.10);
        }

        .bursary-title {
            font-size: 1.15rem;
            font-weight: 700;
            color: #0b1a2e;
            margin-bottom: 0.4rem;
            letter-spacing: -0.01em;
        }

        .bursary-title .badge-faculty {
            display: inline-block;
            font-size: 0.65rem;
            font-weight: 600;
            background: rgba(37, 99, 235, 0.10);
            color: #2563eb;
            padding: 0.05rem 0.65rem;
            border-radius: 40px;
            margin-left: 0.4rem;
            vertical-align: middle;
        }

        .deadline {
            color: #b91c1c;
            font-weight: 600;
            font-size: 0.92rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .deadline .icon {
            font-size: 1rem;
        }

        /* ── Empty State ── */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4rem 2rem;
            background: rgba(255, 255, 255, 0.70);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: 40px;
            color: #5b6f89;
            border: 1.5px dashed rgba(37, 99, 235, 0.15);
            font-size: 1.05rem;
            font-weight: 450;
        }

        /* ── Ads Container ── */
        .ads-container {
            margin: 2rem 0;
            text-align: center;
            min-height: 90px;
            background: rgba(255, 255, 255, 0.40);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #8a9bb0;
            font-size: 0.85rem;
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.2s;
        }

        /* ── WhatsApp Floating ── */
        .wa-floating-container {
            position: fixed;
            top: 50%;
            right: 1.5rem;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.4rem;
            z-index: 99999;
        }

        .wa-floating-btn {
            width: 62px;
            height: 62px;
            background: linear-gradient(135deg, #25d366, #1ebe5a);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.1rem;
            text-decoration: none;
            box-shadow: 0 6px 24px -4px rgba(37, 211, 102, 0.35), 0 2px 8px rgba(0, 0, 0, 0.02);
            transition: all 0.25s cubic-bezier(0.22, 1, 0.36, 1);
            border: none;
            line-height: 1;
        }

        .wa-floating-btn:hover {
            background: linear-gradient(135deg, #1ebe5a, #17a84a);
            transform: scale(1.06) rotate(-2deg);
            box-shadow: 0 12px 36px -6px rgba(37, 211, 102, 0.45);
        }

        .wa-floating-btn:active {
            transform: scale(0.93);
        }

        .wa-text-label {
            color: #1a2f4e;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            background: rgba(255, 255, 255, 0.90);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 0.25rem 0.65rem;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 2px 8px -4px rgba(0, 0, 0, 0.02);
            white-space: nowrap;
            text-align: center;
            line-height: 1.3;
            max-width: 100px;
        }

        /* ── Responsive ── */
        @media (max-width: 640px) {
            body {
                padding: 1.25rem 0.9rem;
            }

            .portal-header h1 {
                font-size: 2rem;
            }

            .portal-header p {
                font-size: 1rem;
            }

            .top-nav {
                flex-direction: column;
                align-items: stretch;
                text-align: center;
                border-radius: 28px;
                padding: 0.75rem 1.25rem;
                gap: 0.6rem;
            }

            .top-nav .badge {
                font-size: 0.8rem;
            }

            .nav-btn {
                justify-content: center;
                padding: 0.4rem 1rem;
                font-size: 0.85rem;
            }

            .faculty-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 1rem;
            }

            .faculty-card,
            .home-card {
                padding: 1.4rem 0.6rem;
            }

            .faculty-name,
            .home-label {
                font-size: 1rem;
            }

            .view-choice-section {
                padding: 2rem 1.25rem;
                border-radius: 24px;
            }

            .view-choice-section h3 {
                font-size: 1.4rem;
            }

            .choice-btn {
                padding: 0.7rem 1.6rem;
                font-size: 0.95rem;
                min-width: 140px;
            }

            .calendar-grid {
                grid-template-columns: 1fr;
            }

            .original-grid {
                grid-template-columns: 1fr;
            }

            .wa-floating-container {
                right: 0.75rem;
            }

            .wa-floating-btn {
                width: 52px;
                height: 52px;
                font-size: 1.7rem;
            }

            .wa-text-label {
                font-size: 0.6rem;
                padding: 0.15rem 0.45rem;
                max-width: 80px;
            }

            .month-box {
                padding: 1rem;
            }
        }

        @media (max-width: 420px) {
            .faculty-grid {
                grid-template-columns: 1fr 1fr;
                gap: 0.8rem;
            }

            .choice-grid {
                flex-direction: column;
                align-items: center;
            }

            .choice-btn {
                width: 100%;
                max-width: 280px;
            }
        }

        /* ── Subtle animation for content appearance ── */
        @keyframes fadeUp {
            0% {
                opacity: 0;
                transform: translateY(12px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .faculty-grid .faculty-card,
        .faculty-grid .home-card,
        .calendar-grid .month-box,
        .original-grid .bursary-card {
            animation: fadeUp 0.4s ease both;
        }

        .faculty-grid .faculty-card:nth-child(2) {
            animation-delay: 0.04s;
        }
        .faculty-grid .faculty-card:nth-child(3) {
            animation-delay: 0.08s;
        }
        .faculty-grid .faculty-card:nth-child(4) {
            animation-delay: 0.12s;
        }
        .faculty-grid .faculty-card:nth-child(5) {
            animation-delay: 0.16s;
        }
        .faculty-grid .faculty-card:nth-child(6) {
            animation-delay: 0.20s;
        }
        .faculty-grid .faculty-card:nth-child(7) {
            animation-delay: 0.24s;
        }
    </style>
</head>

                { id: 'sciences', name: 'Sciences', url: 'Sciences.ics' }
            ];

            const MONTH_NAMES = ["January", "February", "March", "April", "May", "June", "July", "August", "September",
                "October", "November", "December"
            ];

            // ── State ──
            let currentFaculty = null;
            let currentStyle = null;

            // ── DOM refs ──
            const fView = document.getElementById('facultyView');
            const formatView = document.getElementById('formatView');
            const calContainer = document.getElementById('calendarContainer');
            const gridContainer = document.getElementById('gridContainer');
            const navBar = document.getElementById('navigationBar');
            const mainTitle = document.querySelector('.portal-header h1');
            const subTitle = document.getElementById('dynamicSubtitle');
            const choiceLabel = document.querySelector('.view-choice-section h3');
            const layoutBadge = document.getElementById('layoutBadge');

            // ── Init ──
            function init() {
                // Faculty cards
                document.querySelectorAll('.faculty-grid .faculty-card').forEach(card => {
                    card.addEventListener('click', () => {
                        const targetId = card.getAttribute('data-id');
                        const selected = FACULTY_FILES.find(f => f.id === targetId);
                        if (selected) openFormatSelection(selected);
                    });
                });

                // Format buttons
                document.querySelectorAll('.choice-grid .choice-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const targetStyle = btn.getAttribute('data-style');
                        executeRenderFeed(targetStyle);
                    });
                });

                // Nav controls
                document.getElementById('navBackBtn').addEventListener('click', rollbackToFormatSelection);
                document.getElementById('navHomeBtn').addEventListener('click', resetToHomeView);
            }

            // ── View transitions ──
            function openFormatSelection(facultyConfig) {
                currentFaculty = facultyConfig;

                // Update header
                const span = mainTitle.querySelector('.accent') || mainTitle;
                if (span.tagName === 'SPAN') {
                    span.textContent = facultyConfig.name;
                } else {
                    mainTitle.innerHTML = `🎓 <span class="accent">${facultyConfig.name}</span>`;
                }
                subTitle.textContent = "Choose your display format";

                // Toggle views
                fView.classList.add('hidden');
                formatView.classList.remove('hidden');
                calContainer.classList.add('hidden');
                gridContainer.classList.add('hidden');

                navBar.classList.remove('hidden');
                document.getElementById('navBackBtn').classList.add('hidden');
                layoutBadge.textContent = 'Format Selection';
            }

            async function executeRenderFeed(style) {
                currentStyle = style;

                formatView.classList.add('hidden');
                document.getElementById('navBackBtn').classList.remove('hidden');

                layoutBadge.textContent = style === 'calendar' ? '📅 Calendar View' : '🗂️ Grid View';
                subTitle.textContent = style === 'calendar' ?
                    'Deadlines organized by month' :
                    'Deadlines listed alphabetically';

                if (style === 'calendar') {
                    calContainer.classList.remove('hidden');
                    gridContainer.classList.add('hidden');
                } else {
                    gridContainer.classList.remove('hidden');
                    calContainer.classList.add('hidden');
                }

                await loadAndProcessFeed();
            }

            function rollbackToFormatSelection() {
                calContainer.classList.add('hidden');
                gridContainer.classList.add('hidden');
                document.getElementById('navBackBtn').classList.add('hidden');

                formatView.classList.remove('hidden');

                if (currentFaculty) {
                    const span = mainTitle.querySelector('.accent') || mainTitle;
                    if (span.tagName === 'SPAN') {
                        span.textContent = currentFaculty.name;
                    } else {
                        mainTitle.innerHTML = `🎓 <span class="accent">${currentFaculty.name}</span>`;
                    }
                    subTitle.textContent = "Choose your display format";
                }
                layoutBadge.textContent = 'Format Selection';
            }

            function resetToHomeView() {
                currentFaculty = null;
                currentStyle = null;

                formatView.classList.add('hidden');
                calContainer.classList.add('hidden');
                gridContainer.classList.add('hidden');
                navBar.classList.add('hidden');

                mainTitle.innerHTML = '🎓 <span class="accent">Bursary</span> Hub';
                subTitle.textContent = 'Select a faculty to explore closing dates';
                fView.classList.remove('hidden');
            }

            // ── ICS Parser ──
            async function loadAndProcessFeed() {
                const activeContainer = currentStyle === 'calendar' ? calContainer : gridContainer;
                activeContainer.innerHTML = '<div class="empty-state">⏳ Loading data …</div>';

                try {
                    const response = await fetch(currentFaculty.url);
                    if (!response.ok) throw new Error('Network response was not ok');
                    const rawText = await response.text();

                    const collection = parseICS(rawText, currentFaculty);

                    if (currentStyle === 'calendar') {
                        renderCalendarLayout(collection, calContainer);
                    } else {
                        renderGridLayout(collection, gridContainer);
                    }
                } catch (_) {
                    activeContainer.innerHTML =
                        '<div class="empty-state">📭 Could not load deadline data for this faculty.</div>';
                }
            }

            function parseICS(icsText, config) {
                const dataset = [];
                const lines = icsText.split(/\r?\n/);
                let activeEvent = null;

                for (let i = 0; i < lines.length; i++) {
                    let line = lines[i];
                    while (i + 1 < lines.length && (lines[i + 1].startsWith(' ') || lines[i + 1].startsWith('\t'))) {
                        line += lines[i + 1].substring(1);
                        i++;
                    }

                    if (line.startsWith('BEGIN:VEVENT')) {
                        activeEvent = { categoryId: config.id, category: config.name };
                    } else if (line.startsWith('END:VEVENT') && activeEvent) {
                        if (activeEvent.title) dataset.push(activeEvent);
                        activeEvent = null;
                    } else if (activeEvent) {
                        if (line.startsWith('SUMMARY:')) {
                            let title = line.replace('SUMMARY:', '').replace(/\s*[Dd]eadline\s*/gi, '').trim();
                            activeEvent.title = title || 'Untitled';
                        } else if (line.startsWith('DTSTART;VALUE=DATE:') || line.startsWith('DTSTART:')) {
                            const raw = line.split(':').pop().trim();
                            if (raw.length >= 8) {
                                const y = raw.substring(0, 4);
                                const m = raw.substring(4, 6);
                                const d = raw.substring(6, 8);
                                activeEvent.day = parseInt(d, 10);
                                activeEvent.monthIndex = parseInt(m, 10) - 1;
                                const dt = new Date(`${y}-${m}-${d}`);
                                activeEvent.dateStr = dt.toLocaleDateString('en-ZA', {
                                    year: 'numeric',
                                    month: 'long',
                                    day: 'numeric'
                                });
                            }
                        }
                    }
                }
                return dataset;
            }

            // ── Renderers ──
            function renderCalendarLayout(items, target) {
                target.innerHTML = '';
                if (!items.length) {
                    target.innerHTML = '<div class="empty-state">📭 No deadlines found for this faculty.</div>';
                    return;
                }

                const buckets = Array.from({ length: 12 }, () => []);
                items.forEach(item => {
                    if (item.monthIndex !== undefined && item.monthIndex >= 0 && item.monthIndex < 12) {
                        buckets[item.monthIndex].push(item);
                    }
                });

                buckets.forEach((monthItems, idx) => {
                    if (!monthItems.length) return;
                    monthItems.sort((a, b) => (a.day || 0) - (b.day || 0));

                    const box = document.createElement('div');
                    box.className = 'month-box';
                    let html = `<div class="month-title">${MONTH_NAMES[idx]} <span class="month-count">${monthItems.length}</span></div>`;
                    monthItems.forEach(item => {
                        html += `
                            <div class="event-item">
                                <span class="event-name">${item.title}</span>
                                <span class="event-day">Day ${item.day || '–'}</span>
                            </div>`;
                    });
                    box.innerHTML = html;
                    target.appendChild(box);
                });

                if (!target.children.length) {
                    target.innerHTML = '<div class="empty-state">📭 No deadlines found for this faculty.</div>';
                }
            }

            function renderGridLayout(items, target) {
                target.innerHTML = '';
                if (!items.length) {
                    target.innerHTML = '<div class="empty-state">📭 No deadlines found for this faculty.</div>';
                    return;
                }

                const sorted = items.slice().sort((a, b) =>
                    (a.monthIndex || 0) - (b.monthIndex || 0) || (a.day || 0) - (b.day || 0)
                );

                sorted.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'bursary-card';
                    card.innerHTML = `
                        <div class="bursary-title">${item.title}</div>
                        <div class="deadline"><span class="icon">⏳</span> ${item.dateStr || 'Date not specified'}</div>`;
                    target.appendChild(card);
                });
            }

            // ── Boot ──
            window.addEventListener('DOMContentLoaded', init);
        })();
    </script>
</body>
</html>
