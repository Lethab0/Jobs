<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1486635931470536"
     crossorigin="anonymous"></script>
    <title>Bursary Hub Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            background: #f8fafc;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 1300px;
            width: 100%;
        }

        /* header */
        .portal-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .portal-header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: #0f172a;
            letter-spacing: -0.02em;
        }

        .portal-header p {
            color: #475569;
            font-size: 1.1rem;
            margin-top: 0.25rem;
        }

        /* faculty grid */
        .faculty-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-top: 0.75rem;
        }

        .faculty-card, .home-card {
            background: white;
            border: 2px solid #2563eb;
            border-radius: 16px;
            padding: 2rem 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -2px rgba(0,0,0,0.03);
            text-decoration: none;
            display: block;
        }

        .faculty-card:hover {
            background: #2563eb;
            transform: translateY(-3px);
            box-shadow: 0 12px 20px -8px rgba(37, 99, 235, 0.25);
        }

        .faculty-card:hover .faculty-name {
            color: white;
        }

        .home-card {
            background: #f0f5ff;
            border-color: #2563eb;
        }

        .home-card:hover {
            background: #2563eb;
            transform: translateY(-3px);
            box-shadow: 0 12px 20px -8px rgba(37, 99, 235, 0.25);
        }

        .home-card:hover .home-label {
            color: white;
        }

        .faculty-name {
            font-weight: 700;
            font-size: 1.2rem;
            color: #2563eb;
            transition: color 0.15s;
        }

        .home-label {
            font-weight: 700;
            font-size: 1.2rem;
            color: #2563eb;
            transition: color 0.15s;
        }

        /* view choice */
        .view-choice-section {
            display: none;
            text-align: center;
            padding: 2.5rem 1rem;
            background: white;
            border-radius: 24px;
            border: 1px solid #e2e8f0;
            max-width: 780px;
            margin: 0 auto;
        }

        .view-choice-section h3 {
            font-size: 1.8rem;
            font-weight: 600;
            color: #0f172a;
            margin-bottom: 2rem;
        }

        .choice-grid {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .choice-btn {
            background: white;
            border: 2px solid #2563eb;
            border-radius: 40px;
            padding: 0.9rem 2.5rem;
            font-weight: 600;
            font-size: 1.15rem;
            color: #2563eb;
            cursor: pointer;
            transition: all 0.15s;
            min-width: 180px;
        }

        .choice-btn:hover {
            background: #2563eb;
            color: white;
            box-shadow: 0 8px 14px -6px rgba(37, 99, 235, 0.25);
        }

        .back-btn {
            background: transparent;
            border: 2px solid #2563eb;
            padding: 0.6rem 1.4rem;
            border-radius: 40px;
            font-weight: 600;
            color: #2563eb;
            cursor: pointer;
            transition: 0.15s;
            margin-top: 2.5rem;
            font-size: 0.95rem;
        }

        .back-btn:hover {
            background: #2563eb;
            color: white;
        }

        /* content display section */
        .content-display {
            display: none;
        }

        .top-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            background: white;
            padding: 0.9rem 1.8rem;
            border-radius: 60px;
            border: 1px solid #e2e8f0;
            margin-bottom: 2.25rem;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
        }

        .top-nav .badge {
            font-weight: 700;
            color: #0f172a;
            letter-spacing: 0.03em;
            background: #f1f5f9;
            padding: 0.25rem 1rem;
            border-radius: 30px;
            font-size: 0.9rem;
        }

        .nav-btn {
            background: transparent;
            border: 2px solid #2563eb;
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            font-weight: 600;
            color: #2563eb;
            cursor: pointer;
            transition: 0.15s;
            font-size: 0.9rem;
        }

        .nav-btn:hover {
            background: #2563eb;
            color: white;
        }

        /* calendar layout */
        .calendar-grid {
            display: none;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.8rem;
        }

        .month-box {
            background: white;
            border-radius: 20px;
            border: 1px solid #e9edf2;
            padding: 1.3rem 1.2rem 1.2rem;
            box-shadow: 0 4px 8px -4px rgba(0,0,0,0.02);
        }

        .month-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: #0f172a;
            border-bottom: 2px solid #eef2f6;
            padding-bottom: 0.6rem;
            margin-bottom: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }

        .event-item {
            background: #f1f5f9;
            border-radius: 10px;
            padding: 0.6rem 0.9rem;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .event-name {
            font-weight: 600;
            font-size: 0.95rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 70%;
        }

        .event-day {
            background: white;
            border: 1px solid #d1d9e6;
            padding: 0.1rem 0.6rem;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 700;
            color: #1e293b;
        }

        /* original grid layout */
        .original-grid {
            display: none;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.8rem;
        }

        .bursary-card {
            background: white;
            border-radius: 20px;
            padding: 1.6rem 1.4rem;
            border: 1px solid #e9edf2;
            box-shadow: 0 4px 8px -4px rgba(0,0,0,0.02);
        }

        .bursary-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #0f172a;
            margin-bottom: 0.5rem;
        }

        .deadline {
            color: #b91c1c;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4rem 2rem;
            background: white;
            border-radius: 40px;
            color: #64748b;
            border: 1px dashed #cbd5e1;
        }

        /* AdSense container */
        .ads-container {
            margin: 2rem 0;
            text-align: center;
            min-height: 90px;
            background: #f1f5f9;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #94a3b8;
            font-size: 0.9rem;
            border: 1px dashed #cbd5e1;
        }

        .ads-container amp-ad {
            display: block;
        }

        /* utility */
        .hidden {
            display: none;
        }

        @media (max-width: 480px) {
            .top-nav {
                flex-direction: column;
                align-items: stretch;
                text-align: center;
                border-radius: 24px;
            }
            .choice-btn {
                min-width: 140px;
            }
        }
    </style>
</head>
<body>
    <amp-auto-ads type="adsense"
            data-ad-client="ca-pub-1486635931470536"
            layout="nodisplay">
    </amp-auto-ads>

    <div class="container">
        <header class="portal-header">
            <h1 id="pageTitle">🎓 Bursary Hub</h1>
            <p id="pageSub">Select a faculty to explore closing dates</p>
        </header>

        <div class="ads-container">
            <amp-ad width="100vw" height="90"
                type="adsense"
                data-ad-client="ca-pub-1486635931470536"
                data-ad-slot="1234567890"
                data-auto-format="rspv"
                data-full-width>
                <div overflow></div>
            </amp-ad>
        </div>

        <div id="facultyView">
            <div class="faculty-grid">
                <a href="https://stemclub.co.za" class="home-card">
                    <span class="home-label">🏠 Home (Stem Club)</span>
                </a>
                <div class="faculty-card" data-faculty="accounting"><span class="faculty-name">Accounting</span></div>
                <div class="faculty-card" data-faculty="education"><span class="faculty-name">Education</span></div>
                <div class="faculty-card" data-faculty="engineering"><span class="faculty-name">Engineering</span></div>
                <div class="faculty-card" data-faculty="it-computer-science"><span class="faculty-name">IT & Computer Science</span></div>
                <div class="faculty-card" data-faculty="law"><span class="faculty-name">Law</span></div>
                <div class="faculty-card" data-faculty="sciences"><span class="faculty-name">Sciences</span></div>
            </div>
        </div>

        <div id="viewChoice" class="view-choice-section">
            <h3>📌 Choose display format</h3>
            <div class="choice-grid">
                <button class="choice-btn" data-style="calendar">📅 Calendar</button>
                <button class="choice-btn" data-style="grid">🗂️ Grid (Original)</button>
            </div>
            <button class="back-btn" onclick="resetToFaculties()">← Back to Faculties</button>
        </div>

        <div id="contentDisplay" class="content-display">
            <div class="top-nav">
                <button class="nav-btn" onclick="backToViewChoice()">← Change view</button>
                <span class="badge" id="viewBadge">Layout</span>
                <button class="nav-btn" onclick="resetToFaculties()">Back to Faculties</button>
            </div>

            <div class="ads-container">
                <amp-ad width="100vw" height="90"
                    type="adsense"
                    data-ad-client="ca-pub-1486635931470536"
                    data-ad-slot="0987654321"
                    data-auto-format="rspv"
                    data-full-width>
                    <div overflow></div>
                </amp-ad>
            </div>

            <div id="calendarContainer" class="calendar-grid"></div>
            <div id="gridContainer" class="original-grid"></div>

            <div class="ads-container">
                <amp-ad width="100vw" height="90"
                    type="adsense"
                    data-ad-client="ca-pub-1486635931470536"
                    data-ad-slot="5678901234"
                    data-auto-format="rspv"
                    data-full-width>
                    <div overflow></div>
                </amp-ad>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // --------------------------------------------------------------
            // CONFIGURATION
            const FACULTY_FILES = [
                { id: 'accounting', name: 'Accounting', url: 'accounting.ics' },
                { id: 'education', name: 'Education', url: 'education.ics' },
                { id: 'engineering', name: 'Engineering', url: 'engineering.ics' },
                { id: 'it-computer-science', name: 'IT & Computer Science', url: 'IT and computer science.ics' },
                { id: 'law', name: 'Law', url: 'law.ics' },
                { id: 'sciences', name: 'Sciences', url: 'Sciences.ics' }
            ];

            const MONTH_NAMES = ["January","February","March","April","May","June","July","August","September","October","November","December"];
            const FACULTY_LABEL = {
                'accounting':'Accounting','education':'Education','engineering':'Engineering',
                'it-computer-science':'IT & Computer Science','law':'Law','sciences':'Sciences'
            };

            // --------------------------------------------------------------
            // STATE
            let allBursaries = [];                // flat array of { categoryId, category, title, day, monthIndex, dateStr }
            let selectedFacultyId = null;
            let selectedStyle = null;             // 'calendar' or 'grid'

            // --------------------------------------------------------------
            // DOM refs
            const facultyView = document.getElementById('facultyView');
            const viewChoice = document.getElementById('viewChoice');
            const contentDisplay = document.getElementById('contentDisplay');
            const pageTitle = document.getElementById('pageTitle');
            const pageSub = document.getElementById('pageSub');
            const viewBadge = document.getElementById('viewBadge');
            const calendarContainer = document.getElementById('calendarContainer');
            const gridContainer = document.getElementById('gridContainer');

            // --------------------------------------------------------------
            // PARSER
            function parseICS(icsText, fileConfig) {
                const events = [];
                const lines = icsText.split(/\r?\n/);
                let current = null;

                for (let i = 0; i < lines.length; i++) {
                    let line = lines[i];
                    // fold continuation
                    while (i + 1 < lines.length && (lines[i+1].startsWith(' ') || lines[i+1].startsWith('\t'))) {
                        line += lines[i+1].substring(1);
                        i++;
                    }

                    if (line.startsWith('BEGIN:VEVENT')) {
                        current = { categoryId: fileConfig.id, category: fileConfig.name };
                    } else if (line.startsWith('END:VEVENT') && current) {
                        if (current.title) events.push(current);
                        current = null;
                    } else if (current) {
                        if (line.startsWith('SUMMARY:')) {
                            let raw = line.replace('SUMMARY:', '').replace(/\s*[Dd]eadline\s*/gi, '').trim();
                            current.title = raw || 'Untitled';
                        } else if (line.startsWith('DTSTART;VALUE=DATE:') || line.startsWith('DTSTART:')) {
                            const datePart = line.split(':').pop().trim();
                            if (datePart.length >= 8) {
                                const y = datePart.substring(0,4);
                                const m = datePart.substring(4,6);
                                const d = datePart.substring(6,8);
                                current.day = parseInt(d, 10);
                                current.monthIndex = parseInt(m, 10) - 1;
                                const dateObj = new Date(`${y}-${m}-${d}`);
                                current.dateStr = dateObj.toLocaleDateString('en-ZA', { year:'numeric', month:'long', day:'numeric' });
                            }
                        }
                    }
                }
                return events;
            }

            // --------------------------------------------------------------
            // DATA LOADER
            async function preloadAllData() {
                try {
                    const promises = FACULTY_FILES.map(async (file) => {
                        try {
                            const resp = await fetch(file.url);
                            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                            const txt = await resp.text();
                            return parseICS(txt, file);
                        } catch (_) {
                            // silently skip missing files
                            return [];
                        }
                    });
                    const results = await Promise.all(promises);
                    allBursaries = results.flat();
                } catch (e) {
                    console.warn('Data preload issue:', e);
                }
            }

            // --------------------------------------------------------------
            // RENDER FUNCTIONS
            function renderData() {
                if (!selectedFacultyId || !selectedStyle) return;
                const items = allBursaries.filter(b => b.categoryId === selectedFacultyId);

                // update badge
                viewBadge.textContent = selectedStyle === 'calendar' ? '📅 Calendar view' : '🗂️ Grid view';

                // hide both containers
                calendarContainer.style.display = 'none';
                gridContainer.style.display = 'none';

                if (selectedStyle === 'calendar') {
                    calendarContainer.style.display = 'grid';
                    renderCalendar(items);
                } else {
                    gridContainer.style.display = 'grid';
                    renderGrid(items);
                }
            }

            function renderCalendar(items) {
                calendarContainer.innerHTML = '';
                if (!items.length) {
                    calendarContainer.innerHTML = `<div class="empty-state">📭 No deadlines found for this faculty.</div>`;
                    return;
                }

                // group by month
                const monthGroups = Array.from({ length: 12 }, () => []);
                items.forEach(item => {
                    if (item.monthIndex !== undefined && item.monthIndex >= 0 && item.monthIndex < 12) {
                        monthGroups[item.monthIndex].push(item);
                    }
                });

                let hasContent = false;
                monthGroups.forEach((group, idx) => {
                    if (!group.length) return;
                    hasContent = true;
                    const sorted = group.sort((a,b) => (a.day || 0) - (b.day || 0));
                    const card = document.createElement('div');
                    card.className = 'month-box';
                    let html = `<div class="month-title">${MONTH_NAMES[idx]}</div>`;
                    sorted.forEach(ev => {
                        html += `
                            <div class="event-item">
                                <span class="event-name">${ev.title || 'Untitled'}</span>
                                <span class="event-day">Day ${ev.day || '–'}</span>
                            </div>
                        `;
                    });
                    card.innerHTML = html;
                    calendarContainer.appendChild(card);
                });

                if (!hasContent) {
                    calendarContainer.innerHTML = `<div class="empty-state">📭 No scheduled items for this stream.</div>`;
                }
            }

            function renderGrid(items) {
                gridContainer.innerHTML = '';
                if (!items.length) {
                    gridContainer.innerHTML = `<div class="empty-state">📭 No bursaries listed for this faculty.</div>`;
                    return;
                }
                const sorted = items.slice().sort((a,b) => (a.monthIndex || 0) - (b.monthIndex || 0) || (a.day || 0) - (b.day || 0));
                sorted.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'bursary-card';
                    card.innerHTML = `
                        <div class="bursary-title">${item.title || 'Untitled'}</div>
                        <div class="deadline">⏳ ${item.dateStr || 'No date'}</div>
                    `;
                    gridContainer.appendChild(card);
                });
            }

            // --------------------------------------------------------------
            // NAVIGATION
            function handleFacultySelect(facultyId) {
                selectedFacultyId = facultyId;
                pageTitle.textContent = FACULTY_LABEL[facultyId] || facultyId;
                pageSub.style.display = 'none';
                facultyView.style.display = 'none';
                viewChoice.style.display = 'block';
                contentDisplay.style.display = 'none';
                window.location.hash = facultyId;
            }

            function handleStyleSelect(style) {
                selectedStyle = style;
                viewChoice.style.display = 'none';
                contentDisplay.style.display = 'block';
                renderData();
                window.location.hash = `${selectedFacultyId}/${style}`;
            }

            function backToViewChoice() {
                contentDisplay.style.display = 'none';
                viewChoice.style.display = 'block';
                window.location.hash = selectedFacultyId;
            }

            function resetToFaculties() {
                selectedFacultyId = null;
                selectedStyle = null;
                pageTitle.textContent = '🎓 Bursary Hub';
                pageSub.style.display = 'block';
                facultyView.style.display = 'block';
                viewChoice.style.display = 'none';
                contentDisplay.style.display = 'none';
                window.location.hash = '';
            }

            // --------------------------------------------------------------
            // EVENT LISTENERS
            function setupUI() {
                // faculty cards
                document.querySelectorAll('.faculty-card').forEach(card => {
                    card.addEventListener('click', function() {
                        const fid = this.getAttribute('data-faculty');
                        if (fid) handleFacultySelect(fid);
                    });
                });

                // choice buttons
                document.querySelectorAll('.choice-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const style = this.getAttribute('data-style');
                        if (style) handleStyleSelect(style);
                    });
                });
            }

            // --------------------------------------------------------------
            // INIT
            window.addEventListener('DOMContentLoaded', async function() {
                setupUI();
                await preloadAllData();

                // optional hash recovery
                const hash = window.location.hash.replace('#','');
                if (hash) {
                    const parts = hash.split('/');
                    if (parts.length === 1 && FACULTY_LABEL[parts[0]]) {
                        handleFacultySelect(parts[0]);
                    } else if (parts.length === 2 && FACULTY_LABEL[parts[0]] && (parts[1]==='calendar'||parts[1]==='grid')) {
                        handleFacultySelect(parts[0]);
                        setTimeout(() => {
                            if (selectedFacultyId === parts[0]) {
                                handleStyleSelect(parts[1]);
                            }
                        }, 20);
                    }
                }
            });

            // Expose for inline onclick
            window.backToViewChoice = backToViewChoice;
            window.resetToFaculties = resetToFaculties;
        })();
    </script>
</body>
</html>
